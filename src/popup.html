<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>FACEIT Ping Viewer</title>
  <style>
    body { width: 300px; margin: 0; padding: 14px;
           font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background:#14161c; color:#f5f5f5; }
    h1 { font-size: 14px; color:#ff5500; margin: 0 0 4px; }
    .sub { font-size: 11px; color:#9ca3af; margin: 0 0 12px; }
    ul { list-style:none; padding:0; margin:0; }
    li { display:flex; justify-content:space-between; align-items:baseline;
         padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
    li .label { flex: 1; }
    li .meta { font-size: 10px; color:#6b7280; margin-left:8px; }
    li .ping { font-weight: 600; min-width: 56px; text-align: right; }
    .good{color:#4ade80}.mid{color:#fbbf24}.bad{color:#ef4444}.fail{color:#9ca3af}
    .empty { color:#6b7280; font-style: italic; padding: 12px 0; text-align:center; }
    button { margin-top:12px; width:100%; padding:8px;
             background:#ff5500; color:#fff; border:0; border-radius:6px;
             font-weight: 600; cursor:pointer; }
    button:hover { background:#ff6a1a; }
  </style>
</head>
<body>
  <h1>FACEIT Ping</h1>
  <p class="sub">Encountered servers and their latest ping</p>
  <ul id="list"><li class="empty">Loading…</li></ul>
  <button id="refresh">Measure now</button>
  <script src="popup.js" type="module"></script>
</body>
</html>
